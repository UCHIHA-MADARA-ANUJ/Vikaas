kind = "web"
previewPath = "/"
title = "TechNova 2047 — Mission Bharat"
version = "1.0.0"
id = "artifacts/technova-2047"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23456

[services.development]
run = "pnpm --filter @workspace/technova-2047 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/technova-2047", "run", "build" ]
serve = "static"
publicDir = "artifacts/technova-2047/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23456"
BASE_PATH = "/"
